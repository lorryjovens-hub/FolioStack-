services:
  - type: web
    name: foliostack
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: DATABASE_URL
        fromDatabase:
          name: foliostack-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: foliostack-redis
          property: connectionString

databases:
  - name: foliostack-db
    plan: free
    databaseName: foliostack
    user: foliostack

  - name: foliostack-redis
    plan: free
    ipAllowList: []
