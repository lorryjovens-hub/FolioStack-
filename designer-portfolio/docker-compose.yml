services:
  postgres:
    image: postgres:17
    container_name: foliostack-postgres
    environment:
      POSTGRES_DB: foliostack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-foliostack_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foliostack"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - foliostack-network

  redis:
    image: redis:7-alpine
    container_name: foliostack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-foliostack_redis} --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-foliostack_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - foliostack-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: foliostack-backend
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3002}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-foliostack_secret}@postgres:5432/foliostack
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-foliostack_redis}
      JWT_SECRET: ${JWT_SECRET:-foliostack_jwt_secret_key_2024}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SESSION_SECRET: ${SESSION_SECRET:-foliostack_session_secret}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:5173}
      UPLOAD_DIR: /app/uploads
      DEPLOY_DIR: /app/deployments
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-3002}:3002"
    volumes:
      - uploads_data:/app/uploads
      - deployments_data:/app/deployments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - foliostack-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  foliostack-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  deployments_data:
