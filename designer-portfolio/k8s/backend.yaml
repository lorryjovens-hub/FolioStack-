apiVersion: v1
kind: Namespace
metadata:
  name: foliostack
  labels:
    name: foliostack
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: foliostack-config
  namespace: foliostack
data:
  NODE_ENV: "production"
  PORT: "3002"
  DB_TYPE: "postgres"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: foliostack-secrets
  namespace: foliostack
type: Opaque
stringData:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "foliostack"
  DB_USER: "foliostack"
  DB_PASSWORD: "change-me-in-production"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "your-super-secret-jwt-key-change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foliostack-backend
  namespace: foliostack
  labels:
    app: foliostack
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: foliostack
      component: backend
  template:
    metadata:
      labels:
        app: foliostack
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - foliostack
                - key: component
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
      containers:
      - name: foliostack-backend
        image: ghcr.io/your-username/foliostack:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3002
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: foliostack-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: foliostack-config
              key: PORT
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: foliostack-secrets
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: foliostack-secrets
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: foliostack-secrets
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: foliostack-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: foliostack-secrets
              key: DB_PASSWORD
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: foliostack-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: foliostack-secrets
              key: JWT_SECRET
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: logs
        emptyDir: {}
      - name: uploads
        persistentVolumeClaim:
          claimName: foliostack-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: foliostack-backend
  namespace: foliostack
  labels:
    app: foliostack
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: foliostack
    component: backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: foliostack-backend-hpa
  namespace: foliostack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: foliostack-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foliostack-ingress
  namespace: foliostack
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - foliostack.com
    - api.foliostack.com
    secretName: foliostack-tls
  rules:
  - host: foliostack.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: foliostack-frontend
            port:
              number: 80
  - host: api.foliostack.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: foliostack-backend
            port:
              number: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foliostack-uploads-pvc
  namespace: foliostack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi