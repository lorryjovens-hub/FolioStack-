<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集展示</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #0a0a0a;
            --charcoal: #141414;
            --graphite: #1a1a1a;
            --silver: #2a2a2a;
            --mist: #3a3a3a;
            --ash: #8a8a8a;
            --smoke: #b0b0b0;
            --pearl: #d4d4d4;
            --ivory: #f0ece4;
            --champagne: #c9a96e;
            --champagne-light: #e0c992;
            --champagne-dark: #a68b4b;
            --rose-gold: #b76e79;
            --deep-blue: #1a2a4a;
            --emerald: #2a6b5a;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: var(--font-body);
            background: var(--obsidian);
            color: var(--ivory);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* Header */
        .portfolio-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 169, 110, 0.1);
        }
        
        .portfolio-logo {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 600;
            color: var(--champagne);
            text-decoration: none;
        }
        
        .portfolio-nav {
            display: flex;
            gap: 32px;
        }
        
        .portfolio-nav a {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--smoke);
            text-decoration: none;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        
        .portfolio-nav a:hover {
            color: var(--champagne);
        }
        
        /* Hero Section */
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 48px 80px;
            position: relative;
            background: linear-gradient(135deg, var(--obsidian) 0%, var(--charcoal) 100%);
        }
        
        .hero-content {
            text-align: center;
            max-width: 800px;
        }
        
        .hero-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--champagne), var(--champagne-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            font-family: var(--font-display);
            font-size: 48px;
            color: var(--obsidian);
            border: 3px solid rgba(201, 169, 110, 0.3);
        }
        
        .hero-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .hero-name {
            font-family: var(--font-display);
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 300;
            margin-bottom: 16px;
            color: var(--ivory);
        }
        
        .hero-title {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--champagne);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        
        .hero-bio {
            font-size: 16px;
            color: var(--ash);
            max-width: 600px;
            margin: 0 auto 32px;
            line-height: 1.8;
        }
        
        .hero-location {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--smoke);
            margin-bottom: 32px;
        }
        
        .hero-social {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        
        .hero-social a {
            width: 44px;
            height: 44px;
            border: 1px solid var(--silver);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--smoke);
            transition: all 0.3s;
        }
        
        .hero-social a:hover {
            border-color: var(--champagne);
            color: var(--champagne);
            transform: translateY(-2px);
        }
        
        /* Works Section */
        .works-section {
            padding: 80px 48px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 64px;
        }
        
        .section-title {
            font-family: var(--font-display);
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 300;
            margin-bottom: 16px;
        }
        
        .section-title em {
            color: var(--champagne);
            font-style: italic;
        }
        
        .section-subtitle {
            color: var(--ash);
            font-size: 14px;
        }
        
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
        }
        
        .work-card {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9), rgba(20, 20, 20, 0.95));
            border: 1px solid rgba(201, 169, 110, 0.1);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.4s var(--ease-out-expo);
            cursor: pointer;
        }
        
        .work-card:hover {
            transform: translateY(-8px);
            border-color: rgba(201, 169, 110, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(201, 169, 110, 0.05);
        }
        
        .work-card-image {
            width: 100%;
            height: 240px;
            background: var(--graphite);
            position: relative;
            overflow: hidden;
        }
        
        .work-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s var(--ease-out-expo);
        }
        
        .work-card:hover .work-card-image img {
            transform: scale(1.05);
        }
        
        .work-card-image .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 72px;
            color: rgba(201, 169, 110, 0.2);
            background: linear-gradient(135deg, #1a1a2a 0%, #0a0a0a 100%);
        }
        
        .work-card-category {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 12px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(201, 169, 110, 0.3);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--champagne);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .work-card-content {
            padding: 24px;
        }
        
        .work-card-title {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 12px;
            color: var(--ivory);
            transition: color 0.3s;
        }
        
        .work-card:hover .work-card-title {
            color: var(--champagne);
        }
        
        .work-card-description {
            font-size: 13px;
            color: var(--ash);
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .work-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .work-card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .work-card-tag {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--mist);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .work-card-stats {
            display: flex;
            gap: 16px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--ash);
        }
        
        .work-card-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Footer */
        .portfolio-footer {
            padding: 48px;
            text-align: center;
            border-top: 1px solid rgba(201, 169, 110, 0.1);
        }
        
        .portfolio-footer p {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--ash);
            letter-spacing: 0.1em;
        }
        
        /* Loading */
        .loading-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 2px solid var(--silver);
            border-top-color: var(--champagne);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--ash);
            letter-spacing: 0.2em;
        }
        
        /* Error */
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 48px;
        }
        
        .error-icon {
            width: 80px;
            height: 80px;
            border: 2px solid var(--rose-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: var(--rose-gold);
        }
        
        .error-title {
            font-family: var(--font-display);
            font-size: 32px;
            color: var(--ivory);
        }
        
        .error-message {
            color: var(--ash);
            text-align: center;
            max-width: 400px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .portfolio-header {
                padding: 16px 24px;
            }
            
            .portfolio-nav {
                display: none;
            }
            
            .hero-section {
                padding: 100px 24px 60px;
            }
            
            .works-section {
                padding: 60px 24px;
            }
            
            .works-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Light mode support */
        @media (prefers-color-scheme: light) {
            :root {
                --obsidian: #f8fafc;
                --charcoal: #f1f5f9;
                --graphite: #e2e8f0;
                --silver: #cbd5e1;
                --ivory: #0f172a;
                --ash: #475569;
                --smoke: #1e293b;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <div class="loading-text">加载作品集中...</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        
        // 从URL获取用户名
        function getUsernameFromURL() {
            const path = window.location.pathname;
            const match = path.match(/\/portfolio\/([^\/]+)/);
            return match ? match[1] : null;
        }
        
        // 获取分类中文名
        function getCategoryName(category) {
            const map = {
                design: '设计',
                development: '开发',
                video: '视频',
                photography: '摄影',
                writing: '写作',
                other: '其他'
            };
            return map[category] || category || '其他';
        }
        
        // 格式化数字
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }
        
        // 渲染作品集
        function renderPortfolio(data) {
            const { user, works } = data;
            
            const app = document.getElementById('app');
            
            const socialLinks = [];
            if (user.social?.github) socialLinks.push({ icon: 'GH', url: user.social.github });
            if (user.social?.linkedin) socialLinks.push({ icon: 'LI', url: user.social.linkedin });
            if (user.social?.twitter) socialLinks.push({ icon: 'TW', url: user.social.twitter });
            if (user.social?.website) socialLinks.push({ icon: 'WEB', url: user.social.website });
            
            app.innerHTML = `
                <header class="portfolio-header">
                    <a href="/" class="portfolio-logo">${user.displayName || user.username}</a>
                    <nav class="portfolio-nav">
                        <a href="#works">作品</a>
                        <a href="#about">关于</a>
                        <a href="#contact">联系</a>
                    </nav>
                </header>
                
                <section class="hero-section" id="about">
                    <div class="hero-content">
                        <div class="hero-avatar">
                            ${user.avatarUrl ? `<img src="${user.avatarUrl}" alt="${user.displayName}">` : (user.displayName || user.username).charAt(0).toUpperCase()}
                        </div>
                        <h1 class="hero-name">${user.displayName || user.username}</h1>
                        <p class="hero-title">${user.occupation || '创意工作者'}</p>
                        ${user.bio ? `<p class="hero-bio">${user.bio}</p>` : ''}
                        ${user.location ? `
                            <div class="hero-location">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                ${user.location}
                            </div>
                        ` : ''}
                        ${socialLinks.length > 0 ? `
                            <div class="hero-social">
                                ${socialLinks.map(link => `
                                    <a href="${link.url}" target="_blank" rel="noopener">${link.icon}</a>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                </section>
                
                <section class="works-section" id="works">
                    <div class="section-header">
                        <h2 class="section-title">精选<em>作品</em></h2>
                        <p class="section-subtitle">共 ${works.length} 件作品</p>
                    </div>
                    
                    <div class="works-grid">
                        ${works.map(work => `
                            <article class="work-card" onclick="viewWork('${work.uuid}')">
                                <div class="work-card-image">
                                    ${work.cover_url ? `
                                        <img src="${work.cover_url}" alt="${work.title}" loading="lazy">
                                    ` : `
                                        <div class="placeholder">${work.title.charAt(0)}</div>
                                    `}
                                    ${work.category ? `<span class="work-card-category">${getCategoryName(work.category)}</span>` : ''}
                                </div>
                                <div class="work-card-content">
                                    <h3 class="work-card-title">${work.title}</h3>
                                    ${work.description ? `<p class="work-card-description">${work.description}</p>` : ''}
                                    <div class="work-card-meta">
                                        <div class="work-card-tags">
                                            ${work.tags ? work.tags.split(',').slice(0, 3).map(tag => `
                                                <span class="work-card-tag">${tag.trim()}</span>
                                            `).join('') : ''}
                                        </div>
                                        <div class="work-card-stats">
                                            <span>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                                    <circle cx="12" cy="12" r="3"></circle>
                                                </svg>
                                                ${formatNumber(work.view_count)}
                                            </span>
                                            <span>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                                </svg>
                                                ${formatNumber(work.likes)}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </article>
                        `).join('')}
                    </div>
                </section>
                
                <footer class="portfolio-footer">
                    <p>&copy; ${new Date().getFullYear()} ${user.displayName || user.username}. All rights reserved.</p>
                </footer>
            `;
            
            // 跟踪页面访问
            trackPageView(user.username);
        }
        
        // 查看作品详情
        function viewWork(workId) {
            const username = getUsernameFromURL();
            if (username && workId) {
                window.location.href = `/portfolio/${username}/work/${workId}`;
            }
        }
        
        // 跟踪页面访问
        async function trackPageView(username) {
            try {
                await fetch(`${API_BASE}/analytics/track`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: getSessionId(),
                        page: window.location.pathname,
                        referrer: document.referrer,
                        userAgent: navigator.userAgent,
                        screenWidth: window.screen.width,
                        screenHeight: window.screen.height
                    })
                });
            } catch (e) {
                console.log('Analytics tracking failed');
            }
        }
        
        // 获取会话ID
        function getSessionId() {
            let sessionId = sessionStorage.getItem('portfolio_session_id');
            if (!sessionId) {
                sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                sessionStorage.setItem('portfolio_session_id', sessionId);
            }
            return sessionId;
        }
        
        // 渲染错误页面
        function renderError(message) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="error-container">
                    <div class="error-icon">!</div>
                    <h1 class="error-title">出错了</h1>
                    <p class="error-message">${message}</p>
                    <a href="/" style="color: var(--champagne); text-decoration: none; font-family: var(--font-mono); font-size: 12px;">返回首页</a>
                </div>
            `;
        }
        
        // 加载数据
        async function loadPortfolio() {
            const username = getUsernameFromURL();
            
            if (!username) {
                renderError('未找到作品集信息，请检查URL是否正确');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/portfolio/${username}`);
                const result = await response.json();
                
                if (!response.ok || !result.success) {
                    renderError(result.error || '加载作品集失败');
                    return;
                }
                
                renderPortfolio(result);
            } catch (err) {
                console.error('Load portfolio error:', err);
                renderError('网络错误，请稍后重试');
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', loadPortfolio);
    </script>
</body>
</html>
