            let bio = '';
            let currentSection = '';

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                if (/姓名|名字|name/i.test(trimmed) && !name) {
                    name = trimmed.replace(/^(姓名|名字|name)[：:]\s*/i, '').trim();
                    continue;
                }
                if (/职位|头衔|title|职位|岗位/i.test(trimmed) && !title) {
                    title = trimmed.replace(/^(职位|头衔|title|岗位)[：:]\s*/i, '').trim();
                    continue;
                }
                if (/邮箱|email|e-mail/i.test(trimmed) && !email) {
                    const emailMatch = trimmed.match(/[\w.-]+@[\w.-]+\.\w+/);
                    if (emailMatch) email = emailMatch[0];
                    continue;
                }
                if (/电话|手机|phone|tel/i.test(trimmed) && !phone) {
                    const phoneMatch = trimmed.match(/1[3-9]\d{9}|\+?\d[\d\s-]{8,}/);
                    if (phoneMatch) phone = phoneMatch[0];
                    continue;
                }
                if (/github/i.test(trimmed) && !github) {
                    const ghMatch = trimmed.match(/github\.com\/[\w-]+/);
                    if (ghMatch) github = 'https://' + ghMatch[0];
                    continue;
                }
                if (/linkedin/i.test(trimmed) && !linkedin) {
                    const liMatch = trimmed.match(/linkedin\.com\/in\/[\w-]+/);
                    if (liMatch) linkedin = 'https://' + liMatch[0];
                    continue;
                }
                if (/教育|学历|education/i.test(trimmed)) { currentSection = 'education'; continue; }
                if (/工作|经验|experience|employment/i.test(trimmed)) { currentSection = 'experience'; continue; }
                if (/技能|专长|skill/i.test(trimmed)) { currentSection = 'skills'; continue; }
                if (/项目|作品|project/i.test(trimmed)) { currentSection = 'projects'; continue; }
                if (/简介|介绍|about|summary|bio/i.test(trimmed)) { currentSection = 'bio'; continue; }

                switch (currentSection) {
                    case 'education': educationLines.push(trimmed); break;
                    case 'experience': experienceLines.push(trimmed); break;
                    case 'skills': skillLines.push(trimmed); break;
                    case 'projects': projectLines.push(trimmed); break;
                    case 'bio': bio += trimmed + ' '; break;
                }
            }

            if (name) document.getElementById('userName').value = name;
            if (title) document.getElementById('userTitle').value = title;
            if (bio) document.getElementById('userBio').value = bio.trim();
            if (email) document.getElementById('userEmail').value = email;
            if (phone) document.getElementById('userPhone').value = phone;
            if (github) document.getElementById('userGithub').value = github;
            if (linkedin) document.getElementById('userLinkedIn').value = linkedin;
            if (educationLines.length) document.getElementById('userEducation').value = educationLines.join('\n');
            if (experienceLines.length) document.getElementById('userExperience').value = experienceLines.join('\n');
            if (skillLines.length) document.getElementById('userSkills').value = skillLines.join('\n');
            if (projectLines.length) document.getElementById('userProjects').value = projectLines.join('\n');
        }

        function showFileInfo(file) {
            const fileInfoDiv = document.getElementById('fileInfo');
            const fileSize = formatFileSize(file.size);
            
            // 保存文件对象到全局变量，用于文件查看
            window.resumeFile = file;
            
            // 支持查看的文件类型
            const viewableTypes = ['.pdf', '.doc', '.docx', '.txt', '.md'];
            const fileExt = file.name.toLowerCase().substring(file.name.lastIndexOf('.'));
            const isViewable = viewableTypes.includes(fileExt);
            
            fileInfoDiv.innerHTML = `
                <span class="file-name">${file.name}</span>
                <span class="file-size">${fileSize}</span>
                ${isViewable ? `<span class="view-file" onclick="viewFile('${file.name}')">查看</span>` : ''}
                <span class="remove-file" onclick="removeFile()">删除</span>
            `;
            fileInfoDiv.classList.add('show');
        }

        function viewFile(fileName) {
            // 创建文件查看器
            const modal = document.createElement('div');
            modal.className = 'file-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000;
            `;
            
            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                width: 90%;
                height: 90%;
                background: white;
                border-radius: 8px;
                overflow: hidden;
                position: relative;
            `;
            
            const closeBtn = document.createElement('button');
            closeBtn.innerHTML = '×';
            closeBtn.style.cssText = `
                position: absolute;
                top: 10px;
                right: 10px;
                background: #333;
                color: white;
                border: none;
                border-radius: 50%;
                width: 30px;
                height: 30px;
                font-size: 20px;
                cursor: pointer;
                z-index: 10;
            `;
            closeBtn.onclick = () => document.body.removeChild(modal);
            
            const fileExt = fileName.toLowerCase().substring(fileName.lastIndexOf('.'));
            
            if (fileExt === '.pdf') {
                // PDF文件使用iframe查看
                const iframe = document.createElement('iframe');
                iframe.src = URL.createObjectURL(window.resumeFile);
                iframe.style.cssText = `
                    width: 100%;
                    height: 100%;
                    border: none;
                `;
                modalContent.appendChild(iframe);
            } else if (['.txt', '.md'].includes(fileExt)) {
                // 文本文件直接显示内容
                const pre = document.createElement('pre');
                pre.style.cssText = `
                    width: 100%;
                    height: 100%;
                    margin: 0;
                    padding: 20px;
                    overflow: auto;
                    font-family: monospace;
                    font-size: 14px;
                    line-height: 1.5;
                `;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    pre.textContent = e.target.result;
                };
                reader.readAsText(window.resumeFile);
                
                modalContent.appendChild(pre);
            } else if (['.doc', '.docx'].includes(fileExt)) {
                // Word文件使用Microsoft Office Online查看
                const iframe = document.createElement('iframe');
                const fileUrl = URL.createObjectURL(window.resumeFile);
                iframe.src = `https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(fileUrl)}`;
                iframe.style.cssText = `
                    width: 100%;
                    height: 100%;
                    border: none;
                `;
                modalContent.appendChild(iframe);
            } else {
                // 其他文件类型
                const content = document.createElement('div');
                content.style.cssText = `
                    width: 100%;
                    height: 100%;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    font-size: 16px;
                    color: #333;
                `;
                content.textContent = '该文件类型暂不支持在线查看';
                modalContent.appendChild(content);
            }
            
            modalContent.appendChild(closeBtn);
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
        }

        function removeFile() {
            const fileInput = document.getElementById('resumeFile');
            const fileInfoDiv = document.getElementById('fileInfo');
            
            fileInput.value = '';
            fileInfoDiv.classList.remove('show');
            fileInfoDiv.innerHTML = '';
            parsedResumeContent = '';
            
            document.getElementById('userName').value = '';
            document.getElementById('userTitle').value = '';
            document.getElementById('userBio').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('userGithub').value = '';
            document.getElementById('userLinkedIn').value = '';
            document.getElementById('userEducation').value = '';
            document.getElementById('userExperience').value = '';
            document.getElementById('userSkills').value = '';
            document.getElementById('userProjects').value = '';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 生成按钮点击事件
        document.getElementById('generateBtn').addEventListener('click', async () => {
            // 防御性检查
            const aiProviderEl = document.getElementById('aiProvider');
            const apiKeyEl = document.getElementById('apiKey');
            const baseUrlEl = document.getElementById('baseUrl');
            const modelIdEl = document.getElementById('modelId');
            const userNameEl = document.getElementById('userName');
            const userTitleEl = document.getElementById('userTitle');
            const userBioEl = document.getElementById('userBio');
            
            // 检查所有元素是否存在
            if (!aiProviderEl || !apiKeyEl || !baseUrlEl || !modelIdEl || !userNameEl || !userTitleEl || !userBioEl) {
                showNotification('页面元素加载失败，请刷新页面重试', 'error');
                console.error('缺少必要的页面元素');
                console.error('aiProviderEl:', aiProviderEl);
                console.error('apiKeyEl:', apiKeyEl);
                console.error('baseUrlEl:', baseUrlEl);
                console.error('modelIdEl:', modelIdEl);
                console.error('userNameEl:', userNameEl);
                console.error('userTitleEl:', userTitleEl);
                console.error('userBioEl:', userBioEl);
                return;
            }
            
            // 获取值
            const provider = aiProviderEl.value;
            const apiKey = apiKeyEl.value.trim();
            const baseUrl = baseUrlEl.value.trim();
            const modelId = modelIdEl.value.trim();
            const name = userNameEl.value.trim();
            const title = userTitleEl.value.trim();
            const bio = userBioEl.value.trim();
            
            console.log('生成按钮点击，开始处理...');
            console.log('Provider:', provider);
            console.log('API Key:', apiKey ? '****' : '未提供');
            console.log('Base URL:', baseUrl || '使用默认值');
            console.log('Model ID:', modelId || '使用默认值');
            console.log('Name:', name);
            console.log('Title:', title);
            console.log('Bio:', bio);
            
            // 简化验证 - 只检查是否有API密钥或是否使用测试模式
            if (!apiKey) {
                // 测试模式 - 不需要API密钥
                console.log('使用测试模式生成网站');
            }
            
            updateGenerationProgress(0, '正在准备生成...');
            
            try {
                console.log('正在生成提示...');
                const prompt = generatePrompt(selectedStyle);
                console.log('提示生成完成，长度:', prompt.length);
                
                startCountdown(180);
                
                if (apiKey) {
                    console.log('使用真实API模式');
                    try {
                        await streamAIResponse(provider, apiKey, baseUrl, modelId, prompt, selectedStyle);
                    } catch (streamError) {
                        console.warn('流式传输失败，尝试非流式模式:', streamError.message);
                        try {
                            await nonStreamAIResponse(provider, apiKey, baseUrl, modelId, prompt, selectedStyle);
                        } catch (nonStreamError) {
                            throw new Error(`AI请求失败: ${nonStreamError.message}`);
                        }
                    }
                } else {
                    console.log('使用测试模式');
                    const websiteData = generateMockWebsite(prompt, selectedStyle);
                    generatedWebsiteData = websiteData; // 存储生成的网站数据
                    saveGeneratedSite(websiteData);
                    updatePreview(websiteData.html);
                }
                
                stopCountdown();
                updateGenerationProgress(100, '生成完成！');
                showNotification('网站生成成功！', 'success');
                console.log('网站生成成功');
                
            } catch (error) {
                console.error('生成失败:', error);
                stopCountdown();
                updateGenerationProgress(0, '生成失败');
                showNotification(`生成失败: ${error.message}`, 'error');
            }
        });

        // 预览按钮事件
        document.getElementById('showPreviewBtn').addEventListener('click', showFullPreview);
        document.getElementById('refreshPreviewBtn').addEventListener('click', refreshPreview);
        document.getElementById('saveToSiteBtn').addEventListener('click', function() {
            if (generatedWebsiteData) {
                saveToSite(generatedWebsiteData);
            }
        });
        document.getElementById('downloadBtn').addEventListener('click', function() {
            if (window.currentGeneratedHtml) {
                const websiteData = { html: window.currentGeneratedHtml };
                saveGeneratedSite(websiteData);
            } else if (generatedWebsiteData) {
                saveGeneratedSite(generatedWebsiteData);
            }
        });

        // 加载用户信息
        function loadUserInfo() {
            const stored = localStorage.getItem('user');
            if (stored) {
                try {
                    const user = JSON.parse(stored);
                    const displayName = user.username || user.email?.split('@')[0] || '创作者';
                    const displayEmail = user.email || '';
                    
                    document.getElementById('displayUserName').textContent = displayName;
                    document.getElementById('displayUserEmail').textContent = displayEmail;
                    
                    if (document.getElementById('userName')) {
                        document.getElementById('userName').value = displayName;
                    }
                    
                    const avatar = document.getElementById('userAvatar');
                    if (avatar && user.avatar_url) {
                        avatar.innerHTML = `<img src="${user.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
                    }
                } catch (e) {
                    console.error('Failed to parse user data:', e);
                }
            }
        }

        // 加载主题设置
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }

        // 设置主题
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
            localStorage.setItem('theme', theme);
        }

        // 监听主题变化
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                loadTheme();
            }
        });

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadUserInfo();
            
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'landing.html';
            });
            
            renderStyleGrid();
            loadSavedMedia();
            loadPreviewSize();
            
            const aiProviderEl = document.getElementById('aiProvider');
                const apiKeyEl = document.getElementById('apiKey');
                const baseUrlEl = document.getElementById('baseUrl');
                const modelIdEl = document.getElementById('modelId');
                const maxTokensEl = document.getElementById('maxTokens');
                
                if (typeof globalAIConfig !== 'undefined') {
                    const savedConfig = globalAIConfig.get();
                    
                    if (savedConfig.provider && aiProviderEl) {
                        aiProviderEl.value = savedConfig.provider;
                    }
                    if (savedConfig.apiKey && apiKeyEl) {
                        apiKeyEl.value = savedConfig.apiKey;
                    }
                    if (savedConfig.baseUrl && baseUrlEl) {
                        baseUrlEl.value = savedConfig.baseUrl;
                    }
                    if (savedConfig.modelId && modelIdEl) {
                        modelIdEl.value = savedConfig.modelId;
                    }
                    if (savedConfig.maxTokens && maxTokensEl) {
                        maxTokensEl.value = savedConfig.maxTokens;
                    }
                    
                    globalAIConfig.subscribe((newConfig) => {
                        if (newConfig.provider && aiProviderEl) {
                            aiProviderEl.value = newConfig.provider;
                        }
                        if (newConfig.apiKey && apiKeyEl) {
                            apiKeyEl.value = newConfig.apiKey;
                        }
                        if (newConfig.baseUrl && baseUrlEl) {
                            baseUrlEl.value = newConfig.baseUrl;
                        }
                        if (newConfig.modelId && modelIdEl) {
                            modelIdEl.value = newConfig.modelId;
                        }
                        if (newConfig.maxTokens && maxTokensEl) {
                            maxTokensEl.value = newConfig.maxTokens;
                        }
                    });
                    
                    const saveAIConfig = () => {
                        const config = {
                            provider: aiProviderEl ? aiProviderEl.value : '',
                            apiKey: apiKeyEl ? apiKeyEl.value : '',
                            baseUrl: baseUrlEl ? baseUrlEl.value : '',
                            modelId: modelIdEl ? modelIdEl.value : '',
                            maxTokens: maxTokensEl ? (parseInt(maxTokensEl.value) || 10000) : 10000
                        };
                        globalAIConfig.save(config);
                    }
                    
                    if (aiProviderEl) aiProviderEl.addEventListener('change', saveAIConfig);
                    if (apiKeyEl) apiKeyEl.addEventListener('input', saveAIConfig);
                    if (baseUrlEl) baseUrlEl.addEventListener('input', saveAIConfig);
                    if (modelIdEl) modelIdEl.addEventListener('input', saveAIConfig);
                    if (maxTokensEl) maxTokensEl.addEventListener('input', saveAIConfig);
                    
                    document.querySelectorAll('.token-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            setTimeout(saveAIConfig, 100);
                        });
                    });
                    
                } else {
                    if (aiProviderEl) aiProviderEl.value = 'volcengine';
                    if (apiKeyEl) apiKeyEl.value = 'b7055639-09d4-415e-8d11-0b528aec77af';
                    if (baseUrlEl) baseUrlEl.value = 'https://ark.cn-beijing.volces.com/api/coding/v1/messages';
                    if (modelIdEl) modelIdEl.value = 'doubao-seed-2.0-code';
                }
        });
    </script>
