<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI生成 - FolioStack</title>
    <meta name="description" content="使用AI生成专业简历网站作品集">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #0a0a0a;
            --charcoal: #141414;
            --graphite: #1a1a1a;
            --silver: #2a2a2a;
            --mist: #3a3a3a;
            --ash: #8a8a8a;
            --smoke: #b0b0b0;
            --pearl: #d4d4d4;
            --ivory: #f0ece4;
            --champagne: #c9a96e;
            --champagne-light: #e0c992;
            --champagne-dark: #a68b4b;
            --rose-gold: #b76e79;
            --deep-blue: #1a2a4a;
            --emerald: #2a6b5a;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--obsidian);
            color: var(--ivory);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 浅色主题 - 优雅的灰白色渐变 */
        body.light-mode {
            --obsidian: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
            --charcoal: rgba(255, 255, 255, 0.95);
            --graphite: rgba(241, 245, 249, 0.8);
            --silver: #e2e8f0;
            --mist: #64748b;
            --ash: #475569;
            --smoke: #1e293b;
            --pearl: #0f172a;
            --ivory: #0f172a;
            --champagne: #b8944d;
            --champagne-light: #d4b876;
            --champagne-dark: #967a3a;
            --rose-gold: #a85f6a;
            --deep-blue: #1e40af;
            --emerald: #059669;
        }
        
        /* 浅色主题的背景渐变 */
        body.light-mode {
            background: var(--obsidian);
            background-attachment: fixed;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--charcoal);
            border-right: 1px solid rgba(201, 169, 110, 0.08);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 28px 24px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.08);
        }

        .sidebar-logo {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 600;
            color: var(--champagne);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo span {
            font-weight: 300;
            color: var(--smoke);
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .sidebar-nav {
            flex: 1;
            padding: 24px 0;
        }

        .nav-section {
            margin-bottom: 32px;
        }

        .nav-section-title {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--mist);
            padding: 0 24px;
            margin-bottom: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            color: var(--smoke);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            position: relative;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--champagne);
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .nav-item:hover {
            color: var(--ivory);
            background: rgba(201, 169, 110, 0.05);
        }

        .nav-item.active {
            color: var(--champagne);
            background: rgba(201, 169, 110, 0.08);
        }

        .nav-item.active::before {
            transform: scaleY(1);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            flex-shrink: 0;
        }

        .nav-item .nav-badge {
            margin-left: auto;
            background: var(--champagne);
            color: var(--obsidian);
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .sidebar-footer {
            padding: 24px;
            border-top: 1px solid rgba(201, 169, 110, 0.08);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--champagne-dark), var(--champagne));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 600;
            color: var(--obsidian);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--ivory);
            margin-bottom: 2px;
        }

        .user-email {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--mist);
        }

        .logout-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid var(--silver);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: var(--rose-gold);
            background: rgba(183, 110, 121, 0.1);
        }

        .logout-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--smoke);
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px 48px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 400;
            color: var(--ivory);
        }

        .page-title em {
            font-style: italic;
            color: var(--champagne);
        }

        .page-subtitle {
            color: var(--ash);
            font-size: 1rem;
            margin-bottom: 3rem;
        }

        .ai-generate-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            align-items: start;
        }

        .input-section {
            background: linear-gradient(135deg, var(--charcoal) 0%, var(--obsidian) 100%);
            border: 1px solid rgba(201,169,110,0.15);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--champagne) var(--graphite);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        
        .input-section::-webkit-scrollbar {
            width: 6px;
        }
        
        .input-section::-webkit-scrollbar-track {
            background: rgba(201,169,110,0.05);
            border-radius: 3px;
        }
        
        .input-section::-webkit-scrollbar-thumb {
            background: var(--champagne);
            border-radius: 3px;
        }
        
        .input-section::-webkit-scrollbar-thumb:hover {
            background: var(--champagne-light);
        }
        
        .input-group {
            background: rgba(10,10,10,0.5);
            border: 1px solid rgba(201,169,110,0.1);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .input-group:hover {
            border-color: var(--champagne);
            box-shadow: 0 4px 16px rgba(201,169,110,0.1);
        }
        
        .input-group-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ivory);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--champagne);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .input-group-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--champagne);
            border-radius: 2px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--ivory);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            color: var(--smoke);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(20,20,20,0.8);
            border: 2px solid rgba(201,169,110,0.1);
            border-radius: 6px;
            color: var(--ivory);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--champagne);
            box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
            background: rgba(20,20,20,0.9);
        }
        
        .form-input::placeholder {
            color: rgba(201,169,110,0.3);
        }

        .file-upload-container {
            position: relative;
            margin-bottom: 8px;
        }

        .file-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .file-upload-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: var(--graphite);
            border: 2px dashed rgba(201,169,110,0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--ivory);
            font-size: 14px;
            font-weight: 400;
        }

        .file-upload-button:hover {
            border-color: var(--champagne);
            background: rgba(201,169,110,0.05);
        }

        .file-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--graphite);
            border: 1px solid rgba(201,169,110,0.1);
            border-radius: 4px;
            font-size: 12px;
            color: var(--smoke);
            margin-top: 8px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .file-info.show {
            opacity: 1;
            transform: translateY(0);
        }

        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            color: var(--champagne);
            margin: 0 12px;
        }

        .remove-file {
            color: var(--rose-gold);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
            transition: background-color 0.3s ease;
        }

        .remove-file:hover {
            background: rgba(183,110,121,0.1);
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .style-card {
            background: rgba(20,20,20,0.8);
            border: 2px solid rgba(201,169,110,0.1);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .style-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--champagne), var(--champagne-light));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .style-card:hover {
            border-color: var(--champagne);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(201,169,110,0.15);
        }

        .style-card:hover::before {
            transform: scaleX(1);
        }

        .style-card.selected {
            border-color: var(--champagne);
            background: rgba(201,169,110,0.05);
            box-shadow: 0 4px 16px rgba(201,169,110,0.2);
        }

        .style-card.selected::before {
            transform: scaleX(1);
        }

        .style-card h5 {
            color: var(--ivory);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .style-card p {
            color: var(--ash);
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .design-fields {
            font-size: 0.7rem;
            color: var(--champagne);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--champagne) 0%, var(--champagne-light) 100%);
            color: var(--obsidian);
            box-shadow: 0 4px 16px rgba(201,169,110,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201,169,110,0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(20,20,20,0.8);
            color: var(--ivory);
            border: 2px solid rgba(201,169,110,0.2);
            backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            border-color: var(--champagne);
            background: rgba(20,20,20,0.9);
            box-shadow: 0 4px 16px rgba(201,169,110,0.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .preview-section {
            background: linear-gradient(135deg, var(--charcoal) 0%, var(--obsidian) 100%);
            border: 1px solid rgba(201,169,110,0.15);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--champagne) var(--graphite);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        
        .preview-section::-webkit-scrollbar {
            width: 6px;
        }
        
        .preview-section::-webkit-scrollbar-track {
            background: rgba(201,169,110,0.05);
            border-radius: 3px;
        }
        
        .preview-section::-webkit-scrollbar-thumb {
            background: var(--champagne);
            border-radius: 3px;
        }
        
        .preview-section::-webkit-scrollbar-thumb:hover {
            background: var(--champagne-light);
        }

        .preview-container { 
            width: 100%; 
            height: 350px; 
            border: 2px solid rgba(201,169,110,0.1); 
            border-radius: 8px; 
            overflow: hidden; 
            background: rgba(10,10,10,0.8); 
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .preview-container:hover {
            border-color: var(--champagne);
            box-shadow: 0 12px 40px rgba(201,169,110,0.15);
        }
        
        .preview-placeholder { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            color: var(--ash); 
            font-size: 14px;
            font-family: var(--font-mono);
            flex-direction: column;
            gap: 12px;
        }
        
        .preview-placeholder svg {
            width: 48px;
            height: 48px;
            fill: var(--champagne);
            opacity: 0.3;
        }
        
        .preview-container iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            background: var(--obsidian);
        }
        
        .preview-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .generated-site-section {
            background: rgba(10,10,10,0.6);
            border: 1px solid rgba(201,169,110,0.1);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            backdrop-filter: blur(5px);
        }

        .generated-site-container {
            width: 100%;
            height: 300px;
            border: 2px solid rgba(201,169,110,0.1);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(10,10,10,0.8);
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .generated-site-container:hover {
            border-color: var(--champagne);
            box-shadow: 0 12px 40px rgba(201,169,110,0.15);
        }

        .generated-site-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--obsidian);
        }

        .generated-site-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--ash);
            font-size: 14px;
            font-family: var(--font-mono);
            flex-direction: column;
            gap: 12px;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .ai-generate-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .input-section,
            .preview-section {
                max-height: none;
            }
            
            .preview-container {
                height: 400px;
            }
            
            .generated-site-container {
                height: 300px;
            }
        }
        
        @media (max-width: 768px) {
            .ai-generate-container {
                padding: 0 1rem;
            }
            
            .input-section,
            .preview-section {
                padding: 1.5rem;
            }
            
            .input-group {
                padding: 1rem;
            }
            
            .input-group-title {
                font-size: 1.1rem;
            }
            
            .form-input {
                font-size: 0.9rem;
                padding: 0.6rem;
            }
            
            .style-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.75rem;
            }
            
            .style-card {
                padding: 0.75rem;
            }
            
            .style-card h5 {
                font-size: 0.9rem;
            }
            
            .style-card p {
                font-size: 0.7rem;
            }
            
            .btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }
        }
        
        @media (max-width: 480px) {
            .page-title {
                font-size: 1.8rem;
            }
            
            .section-title {
                font-size: 1.2rem;
            }
            
            .input-group-title {
                font-size: 1rem;
            }
            
            .form-input {
                font-size: 0.85rem;
                padding: 0.5rem;
            }
            
            .style-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.5rem;
            }
            
            .style-card {
                padding: 0.6rem;
            }
            
            .style-card h5 {
                font-size: 0.8rem;
            }
            
            .style-card p {
                font-size: 0.65rem;
            }
            
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }
            
            .preview-container {
                height: 300px;
            }
            
            .generated-site-container {
                height: 250px;
            }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--graphite);
            border-radius: 2px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--champagne), var(--champagne-light));
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .status-message {
            color: var(--smoke);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .streaming-indicator {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 4px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .streaming-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--champagne);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        function processAIResponse(response, style) {
            const htmlMatch = response.match(/<!DOCTYPE html[\s\S]*?<\/html>/i);
            if (htmlMatch) {
                return { html: htmlMatch[0] };
            }
            return { html: response };

            const blob = new Blob([websiteData.html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            a.href = url;

            URL.revokeObjectURL(url);

        // 构建请求体
        function buildRequestBody(config, prompt, stream) {
            const messages = [
                { role: 'system', content: '你是一位专业的网页设计师' },
                { role: 'user', content: prompt }
            ];
            
            switch (config.requestFormat) {
                case 'openai':
                    return {
                        model: config.model,
                        messages: messages,
                        temperature: 0.7,
                        stream: stream
                    };
                
                case 'anthropic':
                    return {
                        model: config.model,
                        messages: messages,
                        temperature: 0.7,
                        stream: stream
                    };
                
                case 'google':
                    return {
                        contents: messages.map(msg => ({
                            role: msg.role,
                            parts: [{ text: msg.content }]
                        })),
                        generationConfig: {
                            temperature: 0.7
                        }
                    };
                
                case 'minimax':
                    return {
                        model: config.model,
                        messages: messages,
                        temperature: 0.7,
                        stream: stream,
                        reply_constraints: {
                            sender_type: 'BOT',
                            sender_name: 'AI'
                        }
                    };
                
                case 'aliyun':
                    return {
                        model: config.model,
                        input: prompt,
                        parameters: {
                            temperature: 0.7
                        }
                    };
                
                default:
                    return {
                        model: config.model,
                        messages: messages,
                        temperature: 0.7,
                        stream: stream
                    };
            }
        }

        // 解析流式响应
        function parseStreamingResponse(line, config) {
            if (!line.startsWith('data: ')) return null;
            
            const data = line.substring(6);
            if (data === '[DONE]') return null;
            
            try {
                const parsed = JSON.parse(data);
                
                switch (config.requestFormat) {
                    case 'openai':
                    case 'zhipu':
                    case 'volcengine':
                    case 'kimi':
                        if (parsed.choices && parsed.choices[0].delta.content) {
                            return parsed.choices[0].delta.content;
                        }
                        break;
                    
                    case 'anthropic':
                        if (parsed.type === 'content_block_delta' && parsed.delta.text) {
                            return parsed.delta.text;
                        }
                        break;
                    
                    case 'google':
                        if (parsed.candidates && parsed.candidates[0].content.parts) {
                            return parsed.candidates[0].content.parts[0].text;
                        }
                        break;
                    
                    case 'minimax':
                        if (parsed.choices && parsed.choices[0].delta) {
                            return parsed.choices[0].delta;
                        }
                        break;
                    
                    case 'aliyun':
                        if (parsed.output && parsed.output.text) {
                            return parsed.output.text;
                        }
                        break;
                }
                
                return null;
            } catch (e) {
                console.error('解析流式数据失败:', e);
                return null;
            }
        }

        // 流式传输AI响应（真实API模式）
        async function streamAIResponse(provider, apiKey, prompt, style) {
            const config = getAIProviderConfig(provider);
            const headers = { ...config.headers };
            
            // 替换API密钥
            Object.keys(headers).forEach(key => {
                if (headers[key].includes('{apiKey}')) {
                    headers[key] = headers[key].replace('{apiKey}', apiKey);
                }
            });
            
            let accumulatedResponse = '';
            let previewUpdated = false;
            
            try {
                const requestBody = buildRequestBody(config, prompt, true);
                
                const response = await fetch(config.endpoint, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(requestBody)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API请求失败: ${response.status} ${response.statusText}\n${errorText}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        const content = parseStreamingResponse(line, config);
                        if (content) {
                            accumulatedResponse += content;
                            
                            // 定期更新预览
                            if (!previewUpdated && accumulatedResponse.length > 500) {
                                updateStreamingPreview(accumulatedResponse);
                                previewUpdated = true;
                            }
                        }
                    }
                }
                
                // 处理完整响应
                const websiteData = processAIResponse(accumulatedResponse, style);
                saveGeneratedSite(websiteData);
                updatePreview(websiteData.html);
                
            } catch (error) {
                throw error;
            }
        }

            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 生成按钮点击事件
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const provider = document.getElementById('aiProvider').value;
            const apiKey = document.getElementById('apiKey').value;
            const name = document.getElementById('userName').value.trim();
            const title = document.getElementById('userTitle').value.trim();
            const bio = document.getElementById('userBio').value.trim();
            
            // 验证必填字段
            if (!name) {
                showNotification('请输入姓名', 'error');
                return;
            }
            
            if (!title) {
                showNotification('请输入职业/职位', 'error');
                return;
            }
            
            if (!bio) {
                showNotification('请输入个人简介', 'error');
                return;
            }
            
            updateGenerationProgress(0, '正在准备生成...');
            
            try {
                const prompt = generatePrompt(selectedStyle);
                
                if (apiKey) {
                    // 真实API模式
                    await streamAIResponse(provider, apiKey, prompt, selectedStyle);
                } else {
                    // 测试模式
                    const websiteData = generateMockWebsite(prompt, selectedStyle);
                    saveGeneratedSite(websiteData);
                    updatePreview(websiteData.html);
                }
                
                updateGenerationProgress(100, '生成完成！');
                showNotification('网站生成成功！', 'success');
                
            } catch (error) {
                updateGenerationProgress(0, '生成失败');
                showNotification(`生成失败: ${error.message}`, 'error');
            }
        });

        // 预览按钮事件
        document.getElementById('showPreviewBtn').addEventListener('click', showFullPreview);
        document.getElementById('refreshPreviewBtn').addEventListener('click', refreshPreview);

        // 加载主题设置
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }

        // 设置主题
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
            localStorage.setItem('theme', theme);
        }

        // 监听主题变化
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                loadTheme();
            }
        });

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            renderStyleGrid();
        });
    </script>
</body>
</html>
