<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建作品 - FolioStack</title>
    <meta name="description" content="创建新的作品集项目">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #0a0a0a;
            --charcoal: #141414;
            --graphite: #1a1a1a;
            --silver: #2a2a2a;
            --mist: #3a3a3a;
            --ash: #8a8a8a;
            --smoke: #b0b0b0;
            --pearl: #d4d4d4;
            --ivory: #f0ece4;
            --champagne: #c9a96e;
            --champagne-light: #e0c992;
            --champagne-dark: #a68b4b;
            --rose-gold: #b76e79;
            --deep-blue: #1a2a4a;
            --emerald: #2a6b5a;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-family: var(--font-body); background: var(--obsidian); color: var(--ivory); overflow-x: hidden; }

        /* 浅色主题 - 优雅的灰白色渐变 */
        body.light-mode {
            --obsidian: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
            --charcoal: rgba(255, 255, 255, 0.95);
            --graphite: rgba(241, 245, 249, 0.8);
            --silver: #e2e8f0;
            --mist: #64748b;
            --ash: #475569;
            --smoke: #1e293b;
            --pearl: #0f172a;
            --ivory: #0f172a;
            --champagne: #b8944d;
            --champagne-light: #d4b876;
            --champagne-dark: #967a3a;
            --rose-gold: #a85f6a;
            --deep-blue: #1e40af;
            --emerald: #059669;
        }
        
        /* 浅色主题的背景渐变 */
        body.light-mode {
            background: var(--obsidian);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--obsidian); }
        ::-webkit-scrollbar-thumb { background: var(--champagne-dark); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--champagne); }

        .dashboard-layout { display: flex; min-height: 100vh; }

        .sidebar { width: 260px; background: var(--charcoal); border-right: 1px solid rgba(201, 169, 110, 0.08); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
        .sidebar-header { padding: 28px 24px; border-bottom: 1px solid rgba(201, 169, 110, 0.08); }
        .sidebar-logo { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--champagne); text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .sidebar-logo span { font-weight: 300; color: var(--smoke); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
        .sidebar-nav { flex: 1; padding: 24px 0; }
        .nav-section { margin-bottom: 32px; }
        .nav-section-title { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--mist); padding: 0 24px; margin-bottom: 12px; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 24px; color: var(--smoke); text-decoration: none; font-size: 14px; transition: all 0.3s; position: relative; }
        .nav-item::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--champagne); transform: scaleY(0); transition: transform 0.3s var(--ease-out-expo); }
        .nav-item:hover { color: var(--ivory); background: rgba(201, 169, 110, 0.05); }
        .nav-item.active { color: var(--champagne); background: rgba(201, 169, 110, 0.08); }
        .nav-item.active::before { transform: scaleY(1); }
        .nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; flex-shrink: 0; }
        .sidebar-footer { padding: 24px; border-top: 1px solid rgba(201, 169, 110, 0.08); }
        .user-card { display: flex; align-items: center; gap: 14px; }
        .user-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--champagne-dark), var(--champagne)); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--obsidian); }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: 500; color: var(--ivory); margin-bottom: 2px; }
        .user-email { font-family: var(--font-mono); font-size: 10px; color: var(--mist); }
        .logout-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: none; border: 1px solid var(--silver); border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .logout-btn:hover { border-color: var(--rose-gold); background: rgba(183, 110, 121, 0.1); }
        .logout-btn svg { width: 18px; height: 18px; stroke: var(--smoke); }

        .main-content { flex: 1; margin-left: 260px; padding: 32px 48px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
        .page-title { font-family: var(--font-display); font-size: 36px; font-weight: 400; color: var(--ivory); }
        .page-title em { font-style: italic; color: var(--champagne); }
        .page-actions { display: flex; gap: 16px; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 28px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; border: none; cursor: pointer; transition: all 0.4s var(--ease-out-expo); }
        .btn-primary { background: var(--champagne); color: var(--obsidian); }
        .btn-primary:hover { background: var(--champagne-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201, 169, 110, 0.2); }
        .btn-secondary { background: var(--graphite); color: var(--smoke); border: 1px solid var(--silver); }
        .btn-secondary:hover { border-color: var(--champagne); color: var(--champagne); }
        .btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }

        .form-container { background: linear-gradient(135deg, rgba(26, 26, 26, 0.95), rgba(20, 20, 20, 0.98)); border: 1px solid rgba(201, 169, 110, 0.08); border-radius: 4px; padding: 48px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
        .form-group { grid-column: span 1; }
        .form-group.full-width { grid-column: span 2; }
        .form-label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mist); margin-bottom: 8px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 12px 16px; background: var(--graphite); border: 1px solid var(--silver); border-radius: 2px; color: var(--ivory); font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.3s; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--champagne); }
        .form-textarea { resize: vertical; min-height: 120px; }
        .form-description { font-size: 12px; color: var(--ash); margin-top: 4px; }

        .upload-zone { border: 2px dashed var(--silver); border-radius: 4px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 24px; }
        .upload-zone:hover { border-color: var(--champagne); background: rgba(201, 169, 110, 0.05); }
        .upload-zone.dragover { border-color: var(--champagne); background: rgba(201, 169, 110, 0.1); }
        .upload-icon { width: 48px; height: 48px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; background: rgba(201, 169, 110, 0.05); border-radius: 50%; }
        .upload-icon svg { width: 24px; height: 24px; stroke: var(--champagne); opacity: 0.6; }
        .upload-text { font-size: 14px; color: var(--smoke); margin-bottom: 8px; }
        .upload-hint { font-size: 12px; color: var(--ash); }

        .form-actions { display: flex; gap: 16px; justify-content: flex-end; margin-top: 40px; }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.4s var(--ease-out-expo); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 24px; }
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .form-container { padding: 32px 24px; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }

        /* 通知系统样式 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--graphite);
            border: 1px solid var(--champagne);
            border-radius: 4px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            opacity: 1;
            transition: opacity 0.3s ease-in;
        }

        .notification.error {
            border-color: var(--rose-gold);
        }

        .notification svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .notification.success svg {
            stroke: var(--emerald);
        }

        .notification.error svg {
            stroke: var(--rose-gold);
        }

        .notification span {
            font-size: 14px;
            color: var(--ivory);
        }

        /* 文件预览样式 */
        .upload-preview {
            position: relative;
            border: 2px solid var(--silver);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
            aspect-ratio: 16/9;
            background: var(--graphite);
        }

        .upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-remove {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--rose-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .preview-remove:hover {
            background: var(--rose-gold);
            transform: scale(1.1);
        }

        .preview-remove svg {
            width: 16px;
            height: 16px;
            stroke: var(--ivory);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

    <script>
    (function() {
        const API_BASE = window.location.origin + '/api';
        let authToken = localStorage.getItem('token');
        let currentUser = null;
        let isEditing = false;
        let workId = null;
        let uploadedFile = null;
        let previewImage = null;

        if (!authToken) {
            window.location.href = 'landing.html';
            return;
        }

        async function fetchWithAuth(url, options = {}) {
            const headers = { ...options.headers };
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }
            const response = await fetch(`${API_BASE}${url}`, { ...options, headers });
            if (response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'landing.html';
                return null;
            }
            return response;
        }

        async function loadUserInfo() {
            const stored = localStorage.getItem('user');
            if (stored) {
                currentUser = JSON.parse(stored);
                updateUserUI(currentUser);
            }
            try {
                const response = await fetchWithAuth('/auth/me');
                if (response && response.ok) {
                    currentUser = await response.json();
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    updateUserUI(currentUser);
                }
            } catch (err) {
                console.error('Failed to load user info:', err);
            }
        }

        function updateUserUI(user) {
            if (!user) return;
            const name = user.username || user.email?.split('@')[0] || '创作者';
            document.getElementById('userName').textContent = name;
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    ${type === 'success' ? '<polyline points="20 6 9 17 4 12"/>' : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'}
                </svg>
                <span>${message}</span>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function validateForm(formData) {
            if (!formData.get('title').trim()) {
                showNotification('请输入作品标题', 'error');
                return false;
            }
            if (!formData.get('category')) {
                showNotification('请选择作品分类', 'error');
                return false;
            }
            if (uploadedFile && uploadedFile.size > 5 * 1024 * 1024) {
                showNotification('文件大小不能超过5MB', 'error');
                return false;
            }
            return true;
        }

        function handleFileUpload(file) {
            if (!file) return;
            
            const validTypes = ['image/jpeg', 'image/png', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showNotification('只支持 JPG, PNG, GIF 格式', 'error');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                showNotification('文件大小不能超过5MB', 'error');
                return;
            }
            
            uploadedFile = file;
            showFilePreview(file);
        }

        function showFilePreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if (previewImage) {
                    previewImage.remove();
                }
                
                previewImage = document.createElement('div');
                previewImage.className = 'upload-preview';
                previewImage.innerHTML = `
                    <img src="${e.target.result}" alt="预览">
                    <button class="preview-remove" onclick="removePreview()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                `;
                
                document.getElementById('uploadZone').style.display = 'none';
                document.getElementById('uploadZone').insertAdjacentElement('afterend', previewImage);
            };
            reader.readAsDataURL(file);
        }

        window.removePreview = function() {
            if (previewImage) {
                previewImage.remove();
                previewImage = null;
                uploadedFile = null;
                document.getElementById('uploadZone').style.display = 'block';
            }
        };

        async function saveWork(formData) {
            const data = {
                title: formData.get('title').trim(),
                description: formData.get('description')?.trim() || '',
                category: formData.get('category'),
                tags: formData.get('tags') ? formData.get('tags').split(',').map(t => t.trim()).filter(t => t) : [],
                project_url: formData.get('project_url')?.trim() || '',
                status: 'draft'
            };

            try {
                let response;
                
                if (uploadedFile) {
                    const uploadFormData = new FormData();
                    uploadFormData.append('file', uploadedFile);
                    uploadFormData.append('title', data.title);
                    uploadFormData.append('description', data.description);
                    uploadFormData.append('category', data.category);
                    uploadFormData.append('tags', JSON.stringify(data.tags));
                    uploadFormData.append('project_url', data.project_url);
                    
                    response = await fetchWithAuth('/works/upload', {
                        method: 'POST',
                        body: uploadFormData
                    });
                } else {
                    response = await fetchWithAuth('/works', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                if (response && response.ok) {
                    showNotification('作品创建成功！');
                    setTimeout(() => window.location.href = 'works.html', 1500);
                } else if (response) {
                    const result = await response.json();
                    showNotification(result.error || '创建失败', 'error');
                }
            } catch (err) {
                console.error('保存作品失败:', err);
                showNotification('网络错误，请重试', 'error');
            }
        }

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileUpload(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files[0]);
            }
        });

        document.getElementById('workForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            if (!validateForm(formData)) {
                return;
            }
            
            await saveWork(formData);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'landing.html';
        });

        // 加载主题设置
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }

        // 设置主题
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
            localStorage.setItem('theme', theme);
        }

        // 监听主题变化
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                loadTheme();
            }
        });

        loadTheme();
        loadUserInfo();
    })();
    </script>
</body>
</html>
