<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - FolioStack</title>
    <meta name="description" content="重置您的FolioStack账户密码">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #0a0a0a;
            --charcoal: #141414;
            --graphite: #1a1a1a;
            --silver: #2a2a2a;
            --mist: #3a3a3a;
            --ash: #8a8a8a;
            --smoke: #b0b0b0;
            --pearl: #d4d4d4;
            --ivory: #f0ece4;
            --champagne: #c9a96e;
            --champagne-light: #e0c992;
            --champagne-dark: #a68b4b;
            --rose-gold: #b76e79;
            --deep-blue: #1a2a4a;
            --emerald: #2a6b5a;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-family: var(--font-body); background: var(--obsidian); color: var(--ivory); overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--obsidian); }
        ::-webkit-scrollbar-thumb { background: var(--champagne-dark); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--champagne); }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(ellipse at 50% 50%, rgba(201, 169, 110, 0.1) 0%, transparent 70%);
        }

        .reset-card {
            background: var(--charcoal);
            border: 1px solid rgba(201, 169, 110, 0.1);
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .reset-logo {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 600;
            color: var(--champagne);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 16px;
        }

        .reset-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 500;
            color: var(--ivory);
            margin-bottom: 12px;
        }

        .reset-description {
            color: var(--ash);
            font-size: 14px;
            line-height: 1.6;
        }

        .reset-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--smoke);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-input {
            padding: 14px 16px;
            background: var(--graphite);
            border: 1px solid var(--silver);
            border-radius: 8px;
            color: var(--ivory);
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--champagne);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
        }

        .form-input::placeholder {
            color: var(--mist);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--champagne);
            color: var(--obsidian);
        }

        .btn-primary:hover {
            background: var(--champagne-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(201, 169, 110, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--smoke);
            border: 1px solid var(--silver);
        }

        .btn-secondary:hover {
            border-color: var(--champagne);
            color: var(--champagne);
        }

        .form-error {
            color: var(--rose-gold);
            font-size: 12px;
            margin-top: 4px;
        }

        .form-success {
            color: var(--emerald);
            font-size: 12px;
            margin-top: 4px;
        }

        .form-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
        }

        .login-link a {
            color: var(--champagne);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: var(--champagne-light);
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .reset-card {
                padding: 32px;
            }

            .reset-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reset-card">
            <div class="reset-header">
                <a href="landing.html" class="reset-logo">FolioStack</a>
                <h1 class="reset-title">重置密码</h1>
                <p class="reset-description">请设置您的新密码</p>
            </div>
            
            <form id="resetForm" class="reset-form">
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" class="form-input" id="newPassword" name="newPassword" placeholder="输入新密码" required>
                    <div class="form-error" id="passwordError"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <input type="password" class="form-input" id="confirmPassword" name="confirmPassword" placeholder="确认新密码" required>
                    <div class="form-error" id="confirmError"></div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="resetBtn">重置密码</button>
                    <a href="landing.html" class="btn btn-secondary">返回登录</a>
                </div>
            </form>
            
            <div class="login-link">
                <a href="landing.html">已有账户？登录</a>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const API_BASE = '/api';
        
        // 从URL中获取重置令牌
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('passwordError').textContent = '无效的重置链接';
            document.getElementById('resetBtn').disabled = true;
            return;
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            
            // 重置错误信息
            document.getElementById('passwordError').textContent = '';
            document.getElementById('confirmError').textContent = '';
            
            // 验证密码
            if (newPassword.length < 6) {
                document.getElementById('passwordError').textContent = '新密码长度不能少于6位';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                document.getElementById('confirmError').textContent = '两次输入的新密码不一致';
                return;
            }
            
            // 显示加载状态
            resetBtn.textContent = '重置中...';
            resetBtn.classList.add('loading');
            
            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token,
                        newPassword,
                        confirmPassword
                    })
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert(result.message || '密码重置成功');
                    window.location.href = 'landing.html';
                } else {
                    const result = await response.json();
                    document.getElementById('passwordError').textContent = result.error || '重置密码失败';
                }
            } catch (err) {
                document.getElementById('passwordError').textContent = '网络错误，请重试';
            } finally {
                resetBtn.textContent = '重置密码';
                resetBtn.classList.remove('loading');
            }
        });
    })();
    </script>
</body>
</html>
