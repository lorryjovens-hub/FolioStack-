    <style>
        :root {
            --obsidian: #0a0a0a;
            --charcoal: #141414;
            --graphite: #1a1a1a;
            --silver: #2a2a2a;
            --mist: #3a3a3a;
            --ash: #8a8a8a;
            --smoke: #b0b0b0;
            --pearl: #d4d4d4;
            --ivory: #f0ece4;
            --champagne: #c9a96e;
            --champagne-light: #e0c992;
            --champagne-dark: #a68b4b;
            --rose-gold: #b76e79;
            --deep-blue: #1a2a4a;
            --emerald: #2a6b5a;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-family: var(--font-body); background: var(--obsidian); color: var(--ivory); overflow-x: hidden; }

        /* 浅色主题 - 优雅的灰白色渐变 */
        body.light-mode {
            --obsidian: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
            --charcoal: rgba(255, 255, 255, 0.95);
            --graphite: rgba(241, 245, 249, 0.8);
            --silver: #e2e8f0;
            --mist: #64748b;
            --ash: #475569;
            --smoke: #1e293b;
            --pearl: #0f172a;
            --ivory: #0f172a;
            --champagne: #b8944d;
            --champagne-light: #d4b876;
            --champagne-dark: #967a3a;
            --rose-gold: #a85f6a;
            --deep-blue: #1e40af;
            --emerald: #059669;
        }
        
        /* 浅色主题的背景渐变 */
        body.light-mode {
            background: var(--obsidian);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--obsidian); }
        ::-webkit-scrollbar-thumb { background: var(--champagne-dark); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--champagne); }

        .dashboard-layout { display: flex; min-height: 100vh; }

        .sidebar { width: 260px; background: var(--charcoal); border-right: 1px solid rgba(201, 169, 110, 0.08); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
        .sidebar-header { padding: 28px 24px; border-bottom: 1px solid rgba(201, 169, 110, 0.08); }
        .sidebar-logo { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--champagne); text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .sidebar-logo span { font-weight: 300; color: var(--smoke); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
        .sidebar-nav { flex: 1; padding: 24px 0; }
        .nav-section { margin-bottom: 32px; }
        .nav-section-title { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--mist); padding: 0 24px; margin-bottom: 12px; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 24px; color: var(--smoke); text-decoration: none; font-size: 14px; transition: all 0.3s; position: relative; }
        .nav-item::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--champagne); transform: scaleY(0); transition: transform 0.3s var(--ease-out-expo); }
        .nav-item:hover { color: var(--ivory); background: rgba(201, 169, 110, 0.05); }
        .nav-item.active { color: var(--champagne); background: rgba(201, 169, 110, 0.08); }
        .nav-item.active::before { transform: scaleY(1); }
        .nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; flex-shrink: 0; }
        .nav-item .nav-badge { margin-left: auto; background: var(--champagne); color: var(--obsidian); font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }

        .user-card { display: flex; align-items: center; gap: 14px; }
        .user-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--champagne-dark), var(--champagne)); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--obsidian); }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: 500; color: var(--ivory); margin-bottom: 2px; }
        .user-email { font-family: var(--font-mono); font-size: 10px; color: var(--mist); }
        .logout-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: none; border: 1px solid var(--silver); border-radius: 8px; cursor: pointer; transition: all 0.3s; }

        .logout-btn svg { width: 18px; height: 18px; stroke: var(--smoke); }

        .main-content { flex: 1; margin-left: 260px; padding: 32px 48px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
        .page-title { font-family: var(--font-display); font-size: 36px; font-weight: 400; color: var(--ivory); }
        .page-title em { font-style: italic; color: var(--champagne); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: linear-gradient(135deg, rgba(26, 26, 26, 0.95), rgba(20, 20, 20, 0.98)); border: 1px solid rgba(201, 169, 110, 0.08); border-radius: 4px; padding: 32px; transition: all 0.4s var(--ease-out-expo); }
        .stat-card:hover { border-color: rgba(201, 169, 110, 0.25); transform: translateY(-4px); }
        .stat-value { font-family: var(--font-display); font-size: 48px; font-weight: 300; color: var(--champagne); margin-bottom: 8px; }
        .stat-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mist); }
        .stat-trend { font-size: 12px; color: var(--emerald); display: flex; align-items: center; gap: 6px; margin-top: 12px; }
        .stat-trend.negative { color: var(--rose-gold); }

        .charts-section { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px; }
        .chart-card { background: linear-gradient(135deg, rgba(26, 26, 26, 0.95), rgba(20, 20, 20, 0.98)); border: 1px solid rgba(201, 169, 110, 0.08); border-radius: 4px; padding: 32px; }
        .chart-title { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: var(--ivory); margin-bottom: 24px; }
        .chart-container { position: relative; height: 300px; }
        .chart-placeholder { height: 300px; display: flex; align-items: center; justify-content: center; background: rgba(201, 169, 110, 0.05); border-radius: 2px; }
        .chart-placeholder svg { width: 48px; height: 48px; stroke: var(--champagne); opacity: 0.3; }

        .top-works { background: linear-gradient(135deg, rgba(26, 26, 26, 0.95), rgba(20, 20, 20, 0.98)); border: 1px solid rgba(201, 169, 110, 0.08); border-radius: 4px; padding: 32px; }
        .section-title { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: var(--ivory); margin-bottom: 24px; }
        .work-list { display: flex; flex-direction: column; gap: 16px; }
        .work-item { display: flex; align-items: center; gap: 16px; padding: 16px; background: rgba(20, 20, 20, 0.5); border-radius: 2px; }
        .work-rank { font-family: var(--font-display); font-size: 24px; font-weight: 300; color: var(--champagne); width: 32px; text-align: center; }
        .work-info { flex: 1; }
        .work-name { font-size: 14px; font-weight: 500; color: var(--ivory); margin-bottom: 4px; }
        .work-meta { font-size: 12px; color: var(--ash); }
        .work-stats { display: flex; gap: 24px; }
        .stat-item { text-align: center; }
        .stat-number { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--champagne); }
        .stat-name { font-size: 10px; color: var(--mist); }

        }
        @media (max-width: 768px) {

            .page-header { flex-direction: column; align-items: flex-start; }

    <script>
    (function() {
        const API_BASE = 'http://localhost:3002/api';
        let authToken = localStorage.getItem('token');
        let currentUser = null;
        let visitsChart = null;
        let performanceChart = null;
        let isDataLoaded = false;

        if (!authToken) {
            window.location.href = 'landing.html';
            return;
        }

        async function fetchWithAuth(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }
            const response = await fetch(`${API_BASE}${url}`, { ...options, headers });
            if (response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'landing.html';
                return null;
            }
            return response;
        }

        async function loadUserInfo() {
            const stored = localStorage.getItem('user');
            if (stored) {
                currentUser = JSON.parse(stored);
                updateUserUI(currentUser);
            }
            try {
                const response = await fetchWithAuth('/auth/me');
                if (response && response.ok) {
                    currentUser = await response.json();
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    updateUserUI(currentUser);
                }
            } catch (err) {
                console.error('Failed to load user info:', err);
            }
        }

        function updateUserUI(user) {
            if (!user) return;
            const name = user.username || user.email?.split('@')[0] || '创作者';
            document.getElementById('userName').textContent = name;
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'landing.html';
        });

        function generateMockVisitData() {
            const labels = [];
            const data = [];
            const now = new Date();
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
                data.push(Math.floor(Math.random() * 100) + 50);
            }
            
            return { labels, data };
        }

        function generateMockPerformanceData() {
            return {
                labels: ['作品1', '作品2', '作品3', '作品4', '作品5'],
                visits: [892, 645, 432, 320, 256],
                likes: [45, 32, 28, 21, 18]
            };
        }

        async function loadAnalyticsData() {
            try {
                const response = await fetchWithAuth('/analytics');
                if (response && response.ok) {
                    const data = await response.json();
                    return data;
                }
                return null;
            } catch (err) {
                console.error('Failed to load analytics data:', err);
                return null;
            }
        }

        function renderVisitsChart(data) {
            const ctx = document.getElementById('visitsChart').getContext('2d');
            
            visitsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: '每日访问量',
                        data: data.data,
                        borderColor: '#c9a96e',
                        backgroundColor: 'rgba(201, 169, 110, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#c9a96e',
                        pointBorderColor: '#0a0a0a',
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10, 10, 10, 0.9)',
                            titleColor: '#f0ece4',
                            bodyColor: '#d4d4d4',
                            borderColor: '#c9a96e',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#8a8a8a',
                                font: {
                                    family: 'var(--font-body)',
                                    size: 11
                                }
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#8a8a8a',
                                font: {
                                    family: 'var(--font-body)',
                                    size: 11
                                }
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function renderPerformanceChart(data) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            performanceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [
                        {
                            label: '访问量',
                            data: data.visits,
                            backgroundColor: 'rgba(201, 169, 110, 0.7)',
                            borderRadius: 4
                        },
                        {
                            label: '收藏数',
                            data: data.likes,
                            backgroundColor: 'rgba(42, 107, 90, 0.7)',
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: '#d4d4d4',
                                font: {
                                    family: 'var(--font-body)',
                                    size: 12
                                },
                                boxWidth: 12,
                                padding: 15
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10, 10, 10, 0.9)',
                            titleColor: '#f0ece4',
                            bodyColor: '#d4d4d4',
                            borderColor: '#c9a96e',
                            borderWidth: 1,
                            padding: 12
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#8a8a8a',
                                font: {
                                    family: 'var(--font-body)',
                                    size: 11
                                }
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#8a8a8a',
                                font: {
                                    family: 'var(--font-body)',
                                    size: 11
                                }
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function updateStatsCards(data) {
            const totalVisits = data.totalVisits || 2453;
            const totalLikes = data.totalLikes || 156;
            const avgTime = data.avgTime || 48;
            const conversion = data.conversion || 24;

            document.querySelector('.stat-card:nth-child(1) .stat-value').textContent = totalVisits.toLocaleString();
            document.querySelector('.stat-card:nth-child(2) .stat-value').textContent = totalLikes.toLocaleString();
            document.querySelector('.stat-card:nth-child(3) .stat-value').textContent = avgTime + '秒';
            document.querySelector('.stat-card:nth-child(4) .stat-value').textContent = conversion + '%';
        }

        async function loadDashboard() {
            const analyticsData = await loadAnalyticsData();
            
            if (analyticsData) {
                updateStatsCards(analyticsData);
                renderVisitsChart(analyticsData.visitData || generateMockVisitData());
                renderPerformanceChart(analyticsData.performanceData || generateMockPerformanceData());
            } else {
                updateStatsCards({});
                renderVisitsChart(generateMockVisitData());
                renderPerformanceChart(generateMockPerformanceData());
            }
            
            isDataLoaded = true;
        }

        function animateStats() {
            const statValues = document.querySelectorAll('.stat-value');
            
            statValues.forEach(stat => {
                const target = parseFloat(stat.textContent.replace(/[^\d.]/g, ''));
                const duration = 2000;
                const startTime = Date.now();
                const startValue = 0;

                function updateStat() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const currentValue = Math.floor(startValue + (target - startValue) * progress);
                    
                    stat.textContent = stat.textContent.replace(/[\d,]+/, currentValue.toLocaleString());
                    
                    if (progress < 1) {
                        requestAnimationFrame(updateStat);
                    }
                }
                
                updateStat();
            });
        }

        // 加载主题设置
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }

        // 设置主题
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
            localStorage.setItem('theme', theme);
        }

        // 监听主题变化
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                loadTheme();
            }
        });

        loadTheme();
        loadUserInfo();
        loadDashboard();

        setTimeout(animateStats, 500);
    })();
    </script>
</body>
</html>
